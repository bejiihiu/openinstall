<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Terminal window decoration -->
  <rect x="540" y="120" width="200" height="80" rx="12" fill="#1f2429" stroke="#30363d" stroke-width="2"/>
  <circle cx="562" cy="143" r="6" fill="#ff5555"/>
  <circle cx="580" cy="143" r="6" fill="#ffaa00"/>
  <circle cx="598" cy="143" r="6" fill="#50fa7b"/>
  
  <!-- Card -->
  <rect x="340" y="260" width="600" height="120" rx="16" fill="#1f2429" stroke="#30363d" stroke-width="1.5"/>
  <text x="640" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="#58a6ff" text-anchor="middle">OpenInstall</text>
  <text x="640" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8b949e" text-anchor="middle">Cross-distro Linux App Installer</text>
  
  <!-- Package manager tags -->
  <rect x="320" y="420" width="120" height="36" rx="8" fill="#1f2429" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="444" font-family="monospace" font-size="16" fill="#58a6ff" text-anchor="middle">apt</text>
  <rect x="460" y="420" width="120" height="36" rx="8" fill="#1f2429" stroke="#30363d" stroke-width="1"/>
  <text x="520" y="444" font-family="monospace" font-size="16" fill="#58a6ff" text-anchor="middle">dnf</text>
  <rect x="600" y="420" width="120" height="36" rx="8" fill="#1f2429" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="444" font-family="monospace" font-size="16" fill="#58a6ff" text-anchor="middle">pacman</text>
  <rect x="740" y="420" width="120" height="36" rx="8" fill="#1f2429" stroke="#30363d" stroke-width="1"/>
  <text x="800" y="444" font-family="monospace" font-size="16" fill="#58a6ff" text-anchor="middle">zypper</text>
  
  <!-- Install command footer -->
  <text x="640" y="530" font-family="monospace" font-size="14" fill="#30363d" text-anchor="middle">~$ curl -sSf https://raw.githubusercontent.com/bejiihiu/openinstall/main/scripts/install.sh | sh</text>
</svg>
